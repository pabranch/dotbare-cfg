### Key Bindings

# change the prefix key
unbind C-b
set -g prefix C-Space

# better split keys
bind | split-window -fhc "#{pane_current_path}"
bind \\ split-window -hc "#{pane_current_path}"
bind - split-window -vc "#{pane_current_path}"
bind _ split-window -fvc "#{pane_current_path}"

# navigation w/o prefix
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# vi keys for history/copy/paste
set -w mode-keys vi
unbind -T copy-mode-vi v
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind -T copy-mode-vi 'y' send -X copy-selection
bind -T copy-mode-vi d send-keys -X halfpage-down
bind -T copy-mode-vi u send-keys -X halfpage-up
bind -T copy-mode-vi Space send-keys -X page-down

# easy resizing of panes
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# toggle zoom
bind -n M-z resize-pane -Z
# same keybind for zoom as Windows Terminal
bind -n C-M-z resize-pane -Z

# toggle between 2 most recent panes
bind -n M-` last-pane
bind -T copy-mode-vi M-` last-pane

# toggle horizontal zoom
bind -n M-x run-shell "~/.tmux/scripts/toggle-layout.sh --axis x"

# toggle vertical zoom
bind -n M-y run-shell "~/.tmux/scripts/toggle-layout.sh --axis y"

### Options

# let other status bars take the bottom
set -g status-position top
set -g status-style fg=black,bg=green

# mouse support
set -g mouse on

# start counting at 1
set -g base-index 1
set -w pane-base-index 1
set -g renumber-windows on

# ensure Shift+Enter and Ctrl+Enter work
set -g extended-keys on
set -g extended-keys-format csi-u

### Sensible Overrides

# Increase tmux messages display duration from default 750ms
set -g display-time 3000

### Plugins

# `git clone --depth=1 https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm`
#set -g @plugin 'tmux-plugins/tpm'
# `brew install tmuxpack/tpack/tpack`

# managed plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @plugin "eduwass/tmux-palette"

# plugin configuration
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-systemd-start-cmd 'start-server'
set -g @continuum-boot-options 'iterm'  # impacts macOS only

#set -g @palette-key 'M-Space'             # default: C-Space (no-prefix)
#set -g @palette-find-pane-key 'M-f'       # optional, no binding by default
#set -g @palette-move-pane-key 'M-m'       # optional, no binding by default

bind C-p run-shell "~/tmux/tmux-plugins/tmux-palette/bin/tmux-palette.sh"

# initialize plugin manager (keep this line at the very bottom of tmux.conf)

if-shell "command -v tpack" \
    "run 'tpack install'"

if-shell "! command -v tpack && test -f ~/.tmux/plugins/tpm/tpm" \
    "run '~/.tmux/plugins/tpm/tpm'"
